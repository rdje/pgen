[package]
name = "pgen"
version = "1.0.0"
edition = "2021"
authors = ["EBNF Parser Generator Project"]
description = "Rust implementation of EBNF AST transformation pipeline"
license = "MIT"

[lib]
name = "pgen"
path = "src/lib.rs"

[[bin]]
name = "ast_pipeline"
path = "src/main.rs"

[[bin]]
name = "sync_tests"
path = "src/bin/sync_tests.rs"

[[bin]]
name = "test_automation_demo"
path = "src/bin/test_automation_demo.rs"

[[bin]]
name = "pgen"
path = "src/bin/pgen.rs"


[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.0", features = ["derive"] }
rand = "0.8"
regex = "1.7"

[dev-dependencies]
tempfile = "3.3"

[[test]]
name = "annotation_parsers"
path = "tests/annotation_parsers/lib.rs"
