name: branch-protection-contract-gate

on:
  workflow_dispatch:

jobs:
  branch-protection-contract-gate:
    name: branch-protection-contract-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Ensure jq runtime
        run: |
          if command -v jq >/dev/null 2>&1; then
            jq --version
          else
            sudo apt-get update
            sudo apt-get install -y jq
            jq --version
          fi

      - name: Run branch protection contract gate
        run: make -C rust SHELL=/bin/bash branch_protection_contract_gate

      - name: Upload branch protection contract artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: branch-protection-contract-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: rust/target/branch_protection_contract_gate
          if-no-files-found: warn
          retention-days: 14
