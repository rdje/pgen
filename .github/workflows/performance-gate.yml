name: performance-gate

on:
  workflow_dispatch:

jobs:
  performance-gate:
    name: performance-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Ensure jq runtime
        run: |
          if command -v jq >/dev/null 2>&1; then
            jq --version
          else
            sudo apt-get update
            sudo apt-get install -y jq
            jq --version
          fi

      - name: Run performance benchmark threshold gate
        run: make -C rust SHELL=/bin/bash performance_gate

      - name: Upload performance gate report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: performance-gate-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: rust/target/performance_gate/report.json
          if-no-files-found: warn
          retention-days: 14
