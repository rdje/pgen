name: annotation-contract-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  annotation-contract-gate:
    name: annotation-contract-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Ensure jq runtime
        run: |
          if command -v jq >/dev/null 2>&1; then
            jq --version
          else
            sudo apt-get update
            sudo apt-get install -y jq
            jq --version
          fi

      - name: Run annotation normative contract gate
        run: make -C rust SHELL=/bin/bash annotation_contract_gate
