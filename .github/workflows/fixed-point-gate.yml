name: fixed-point-gate

on:
  workflow_dispatch:

jobs:
  fixed-point-gate:
    name: fixed-point-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Ensure jq runtime
        run: |
          if command -v jq >/dev/null 2>&1; then
            jq --version
          else
            sudo apt-get update
            sudo apt-get install -y jq
            jq --version
          fi

      - name: Run fixed-point bootstrap reproducibility gate
        env:
          PGEN_STRICT_ANNOTATION_VALIDATION: "1"
        run: make -C rust SHELL=/bin/bash fixed_point_gate

      - name: Upload fixed-point drift artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: fixed-point-gate-drift-${{ github.run_id }}-${{ github.run_attempt }}
          path: rust/target/fixed_point_gate
          if-no-files-found: warn
          retention-days: 14
