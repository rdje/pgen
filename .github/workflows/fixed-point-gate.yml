name: fixed-point-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  fixed-point-gate:
    name: fixed-point-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Verify Perl runtime
        run: perl -MJSON::PP -e 'print "Perl JSON::PP ok\n";'

      - name: Run fixed-point bootstrap reproducibility gate
        env:
          PGEN_STRICT_ANNOTATION_VALIDATION: "1"
        run: make -C rust SHELL=/bin/bash fixed_point_gate

      - name: Upload fixed-point drift artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fixed-point-gate-drift-${{ github.run_id }}-${{ github.run_attempt }}
          path: rust/target/fixed_point_gate
          if-no-files-found: warn
          retention-days: 14
