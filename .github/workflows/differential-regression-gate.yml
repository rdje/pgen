name: differential-regression-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  differential-regression-gate:
    name: differential-regression-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Ensure jq runtime
        run: |
          if command -v jq >/dev/null 2>&1; then
            jq --version
          else
            sudo apt-get update
            sudo apt-get install -y jq
            jq --version
          fi

      - name: Run differential regression gate (new mismatches only)
        run: make -C rust SHELL=/bin/bash differential_regression_gate

      - name: Upload differential regression reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: differential-regression-reports-${{ github.run_id }}-${{ github.run_attempt }}
          path: rust/target/differential_harness
          if-no-files-found: warn
          retention-days: 14
