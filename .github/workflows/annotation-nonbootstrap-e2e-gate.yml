name: annotation-nonbootstrap-e2e-gate

on:
  workflow_dispatch:

jobs:
  annotation-nonbootstrap-e2e-gate:
    name: annotation-nonbootstrap-e2e-gate
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Ensure jq runtime
        run: |
          if command -v jq >/dev/null 2>&1; then
            jq --version
          else
            sudo apt-get update
            sudo apt-get install -y jq
            jq --version
          fi

      - name: Run non-bootstrap annotation end-to-end gate
        env:
          PGEN_STRICT_ANNOTATION_VALIDATION: "1"
        run: make -C rust SHELL=/bin/bash annotation_nonbootstrap_e2e_gate

      - name: Upload non-bootstrap annotation gate artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: annotation-nonbootstrap-e2e-gate-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: rust/target/annotation_nonbootstrap_e2e_gate
          if-no-files-found: warn
          retention-days: 14
