name: sota-exit-gate

on:
  workflow_dispatch:

jobs:
  sota-exit-gate:
    name: sota-exit-gate
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Ensure jq runtime
        run: |
          if command -v jq >/dev/null 2>&1; then
            jq --version
          else
            sudo apt-get update
            sudo apt-get install -y jq
            jq --version
          fi

      - name: Verify Perl runtime for SOTA dual-run surfaces
        run: perl -MJSON::PP -e 'print "Perl JSON::PP ok\n";'

      - name: Run SOTA exit aggregate gate
        env:
          PGEN_STRICT_ANNOTATION_VALIDATION: "1"
          PGEN_SOTA_POLICY_FILE: ${{ github.workspace }}/rust/config/sota_exit_policy.env
          PGEN_SOTA_RUN_EBNF_READINESS: "1"
          PGEN_SOTA_REQUIRE_EBNF_STRICT: "0"
          PGEN_SOTA_RUN_EBNF_DUAL_RUN_DIFF: "1"
          PGEN_SOTA_REQUIRE_EBNF_DUAL_RUN_STRICT: "0"
        run: make -C rust SHELL=/bin/bash sota_exit_gate

      - name: Upload SOTA gate artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: sota-exit-gate-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            rust/target/sota_exit_gate
            rust/target/fixed_point_gate
            rust/target/annotation_robustness_gate
            rust/target/differential_harness
            rust/target/performance_gate
            rust/target/ebnf_frontend_gate
            rust/target/ebnf_frontend_dual_run_gate
            rust/target/stimuli_module_parity_gate
          if-no-files-found: warn
          retention-days: 14
