                                                          ;
shscout	          tech_mbist:out:dft_repair_so            ; # <bp>_<wrap-id>_mem_out(<bp>_<wrap-id>_mem_out_<mem-id>_start_c + mem_dft_repair_so_c)  ==> added MBIST_
repairable	  tech_mbist:out:dft_mbist_repairable     ; # <bp>_<wrap-id>_mem_out(<bp>_<wrap-id>_mem_out_<mem-id>_start_c + mem_dft_mbist_repairable_c)

bist_prog	  tech_mbist:in:dft_mbist_prog            ; # <bp>_<wrap-id>_mem_out(<bp>_<wrap-id>_mem_in_<mem-id>_start_c  + <bp>_<wrap-id>_mem_in_<mem-id>_dft_mbist_prog_c)
