serial_in	  tech_mbist:in:dft_serial_in             ; # <bp>_<wrap-id>_mem_out(<bp>_<wrap-id>_mem_in_<mem-id>_start_c  + <bp>_<wrap-id>_mem_in_<mem-id>_dft_serial_in_c)
serial_out	  tech_mbist:out:dft_serial_out           ; # <bp>_<wrap-id>_mem_out(<bp>_<wrap-id>_mem_out_<mem-id>_start_c + <bp>_<wrap-id>_mem_out_<mem-id>_dft_serial_out_c)
