bbad	          tech_mbist:out:dft_mbist_bad            ; # <bp>_<wrap-id>_mem_out(<bp>_<wrap-id>_mem_out_<mem-id>_start_c + mem_dft_mbist_bad_c)
bend	          tech_mbist:out:dft_mbist_done           ; # <bp>_<wrap-id>_mem_out(<bp>_<wrap-id>_mem_out_<mem-id>_start_c + mem_dft_mbist_done_c)
shscen	          tech_mbist:in:dft_repair_se             ; # <bp>_<wrap-id>_mem_in(<bp>_<wrap-id>_mem_in_<mem-id>_start_c   + mem_dft_repair_se_c)  ==> added MBIST_
shscin	          tech_mbist:in:dft_repair_si             ; # <bp>_<wrap-id>_mem_in(<bp>_<wrap-id>_mem_in_<mem-id>_start_c   + mem_dft_repair_si_c)  ==> added MBIST_
r?raes	          tech_mbist:in:dft_repair_row_en         ; # <bp>_<wrap-id>_mem_in(<bp>_<wrap-id>_mem_in_<mem-id>_start_c   + mem_dft_repair_row_en_c)
