(block_name     LTE_DIGITAL_RF)
(block_prefix   LTE_DIF)
(signal_prefix  DIF)
(cidl_file_name  <block_name>_iosocket.cid)
(right_outline_level      3)
(first_row_column_count   2)
(others_rows_column_count 5)
(corporate_file_header  ericsson_header.txt)
(output_directory       win_cidl_iosocket_data)

; #                                    FIXME
; # SHOULD the line containing the io_intr_mask the its register type will be defined
; # (common_reg_re     "(?i)(?<mandatory_reg>io_ctrl|io_stat|io_conf_error|io_intr_mask)$")
(common_reg_re     "(?i)(?<mandatory_reg>(?<!id_)io_ctrl|(?<!id_)io_stat|io_conf_error|io_intmask|mon_id_io.+)$")
(common_fld_re     "(?i)^(?:io_ctrl|io_stat|io_conf_error|io_intmask|mon_id_io)")
(reg_2ignore       "(?i)io_intmask")
; (reg_2ignore       "(?i)io_foo")

(not_used_field_re "(?i)not\s+used|n/a|-")


(common_reg_decl

 (io_ctrl
 {[ADDRESSOFFSET = <reg_offset>, INTERRUPTMSG]
RCONF_CTRL           IO_CTRL (
     FUENA -> [0..<max_fuena_index>]
);
})

 (io_stat
  {[ADDRESSOFFSET = <reg_offset>, READONLY, INTERRUPTMSG]
RSTAT_CTRL           IO_STAT;
})

 (io_conf_error
 {[ADDRESSOFFSET = <reg_offset>]
RCONF_ERROR_DEST     IO_CONF_ERROR;
})

 (io_intmask
 {[ADDRESSOFFSET = <reg_offset>]
RINTMASK             IO_INTMASK;
})

 (mon_id_io_ctrl
 {[ADDRESSOFFSET = <reg_offset>]
RMON_ID_CONF_CTRL    MON_ID_IO_CTRL;
})

 (mon_id_io_stat
 {[ADDRESSOFFSET = <reg_offset>]
RMON_ID_STAT_CTRL    MON_ID_IO_STAT;
})
)


(cidl_top {<corporate_header>

import <lte_common_iosocket.cid>


//------------------------------------------------------------------------------
// Local Constants defining MailBox size  
//------------------------------------------------------------------------------
const <block_prefix>_IO_QUEUE_SIZE_C   = 16

// CMI GENERIC CONSTANT
const <block_prefix>_IO_FIFO_DEPTH_RD_G_C = 128
const <block_prefix>_IO_FIFO_DEPTH_WR_G_C = 128
const <block_prefix>_IO_NUM_RD_FIFO_C     = 1
const <block_prefix>_IO_NUM_WR_FIFO_C     = 1

//------------------------------------------------------------------------------
// <block_name> IO Socket Definition
//------------------------------------------------------------------------------
[REGWIDTH     = LTE_RB_REG_FIELD_WIDTH_C,     
 REGSPACING   = LTE_RB_REG_SPACING_C,
 BLOCKPREFIX  = BLOCK_PREFIX_LTE_DIGITAL_RF_C, 
 SIGNALPREFIX = SIGNAL_PREFIX_LTE_DIGITAL_RF_C]
COMPONENT  <block_name> {
<register_definitions> 
} // component <block_name>
})

(reg_header_text  {"<block_name> <register_name> Register Description"})

(register_definition {
//------------------------------------------------------------------------------
// <register_name> Register
//------------------------------------------------------------------------------
[ADDRESSOFFSET   = <reg_offset>,
 SWREGHEADERTEXT = <reg_header_text>]
REGISTER {
<register_field_definitions>
} <register_name>;
})


(cidl_file_description "CIDL description file for block <block_name>")

(cidl_common_single_bit_field
  (RW
  { [FieldDefaultValue=<default_value>]
 FEnable  <field_name>;})

  (WO
  { [FieldDefaultValue=<default_value>, WriteOnly]
 FEnable  <field_name>;})

  (RO
  { [FieldDefaultValue=<default_value>, ReadOnly]
 FEnable  <field_name>;})

  (WC
  { [FieldDefaultValue=<default_value>, WriteOnly]
 FClear  <field_name>;})

  (RC
  { [FieldDefaultValue=<default_value>, ReadOnly, ClearOnRead]
 FEnable  <field_name>;})

  (WO/C
  { [FieldDefaultValue=<default_value>, WriteOnly, ClearOnWrite]
 FClear  <field_name>;})

  (ROP
  { [FieldDefaultValue=<default_value>, ReadOnly, TrigOnRead]
 FEnable  <field_name>;})

  (WOP 
  { [FieldDefaultValue=<default_value>, WriteOnly, TrigOnWrite]
 FEnable  <field_name>;})

  (-
  { [Unused]
 FEnable unused;})
)

(cidl_common_multi_bit_field
 (RW
 { [FieldWidth=<field_width>, FieldDefaultValue=<default_value>]
 field {} <field_name>;}); # READ/WRITE

 (WO
 { [FieldWidth=<field_width>, FieldDefaultValue=<default_value>, WriteOnly]
 field {} <field_name>;})

 (RO
 { [FieldWidth=<field_width>, FieldDefaultValue=<default_value>, ReadOnly]
 field {} <field_name>;})

 (ROP
 { [FieldWidth=<field_width>, FieldDefaultValue=<default_value>, ReadOnly, TrigOnRead]
 field {} <field_name>;})

 (RPW
 { [FieldWidth=<field_width>, FieldDefaultValue=<default_value>, TrigOnRead]
 field {} <field_name>;}); # READ/WRITE

 (ROI
 { [FieldWidth=<field_width>, FieldDefaultValue=<default_value>, ReadOnly, Interruptmsg]
 field {} <field_name>;})

 (WOI
 { [FieldWidth=<field_width>, FieldDefaultValue=<default_value>, WriteOnly, Interruptmsg]
 field {} <field_name>;});

 (RWI
 { [FieldWidth=<field_width>, FieldDefaultValue=<default_value>, Interruptmsg]
 field {} <field_name>;}); # READ/WRITE

 (WOP
 { [FieldWidth=<field_width>, FieldDefaultValue=<default_value>, WriteOnly, TrigOnWrite]
 field {} <field_name>;})

 (RWP
 { [FieldWidth=<field_width>, FieldDefaultValue=<default_value>, TrigOnWrite]
 field {} <field_name>;}); # READ/WRITE

 (RC
 { [FieldWidth=<field_width>, FieldDefaultValue=<default_value>, ReadOnly, ClearOnRead]
 field {} <field_name>;})

 (WO/C
 { [FieldWidth=<field_width>, FieldDefaultValue=<default_value>, WriteOnly, ClearOnWrite]
 field {} <field_name>;})

 (-
 { [FieldWidth=<field_width>, Unused]
 field {} unused;})
)


(iosmap_top  {(?top:<name> +endarch=iosmap_archi
<signal_prefix>_conf<:<signal_prefix>_conf_t
<signal_prefix>_stat>:<signal_prefix>_stat_t
<signal_prefix>_io_to_core<:<signal_prefix>_iosocket_to_core_msg_t
<signal_prefix>_core_to_io>:<signal_prefix>_core_to_iosocket_msg_t

<interface>
)})

(iosmap_interface_entry
 (RW     "<field_name>><field_width>")
 (WO     "<field_name>><field_width>")
 (RO     {<field_name><<field_width>  <register_name>_vld})
 (RO_STD {<field_name><<field_width>})
 (ROP    {<field_name><<field_width> <register_name>_vld  <register_name>_rd_strb>})
 (RPW    {<field_name>><field_width> <register_name>_rd_strb>})
 (ROI    {<field_name><<field_width> <register_name>_vld}) ; # Not fully Implemented, also suffixes' count and value are not stabilized yet
 (WOI    "<field_name>><field_width>")                     ; # Not fully Implemented, also suffixes' count and value are not stabilized yet
 (RWI    "<field_name>><field_width>")                     ; # Not fully Implemented, also suffixes' count and value are not stabilized yet
 (WOP    {<field_name>><field_width>  <register_name>_wr_strb>})
 (RWP    {<field_name>><field_width>  <register_name>_wr_strb>})
 (WOP_RWP_1bit    {<field_name>>})
 (RC     {<field_name><<field_width>  <register_name>_vld   <register_name>_clr>})
 (WO/C   {<field_name>><field_width>  <register_name>_vld>  <register_name>_clr })
)

(iosmap_content_entry
 (RW   "<field_name> <= <ios_confrecord>.<register_name>_<field_name>")
 (WO   "<field_name> <= <ios_confrecord>.<register_name>_<field_name>")
 (RO   "<ios_statrecord>.<register_name>_<field_name> <= <field_name>" 
       "<ios_statrecord>.<register_name>_vld <= <register_name>_vld")

 (RO_STD   "<ios_statrecord>.<register_name>_<field_name> <= <field_name>")

 (ROP  "<ios_statrecord>.<register_name>_<field_name> <= <field_name>" 
       "<ios_statrecord>.<register_name>_vld <= <register_name>_vld"
       "<register_name>_rd_strb <= <ios_confrecord>.<register_name>_rd_strb")

 (RPW  "<field_name> <= <ios_confrecord>.<register_name>_<field_name>" 
       "<register_name>_rd_strb <= <ios_confrecord>.<register_name>_rd_strb")

 (ROI  "<ios_statrecord>.<register_name>_<field_name> <= <field_name>"
       "<ios_statrecord>.<register_name>_vld <= <register_name>_vld")     ; # Not fully Implemented, also suffixes' count and value are not stabilized yet

 (WOI  "<field_name> <= <ios_confrecord>.<register_name>_<field_name>")   ; # Not fully Implemented, also suffixes' count and value are not stabilized yet
 (RWI  "<field_name> <= <ios_confrecord>.<register_name>_<field_name>")   ; # Not fully Implemented, also suffixes' count and value are not stabilized yet
 (WOP  "<field_name> <= <ios_confrecord>.<register_name>_<field_name>"
       "<register_name>_wr_strb <= <ios_confrecord>.<register_name>_wr_strb")

 (RWP  "<field_name> <= <ios_confrecord>.<register_name>_<field_name>"
       "<register_name>_wr_strb <= <ios_confrecord>.<register_name>_wr_strb")

 (WOP_RWP_1bit  "<field_name> <= <ios_confrecord>.<register_name>_<field_name>  AND <ios_confrecord>.<register_name>_wr_strb")

 (RC   "<ios_statrecord>.<register_name>_<field_name> <= <field_name>"
       "<ios_statrecord>.<register_name>_vld <= <register_name>_vld"
       "<register_name>_clr <= <ios_confrecord>.<register_name>_clr")

 (WO/C "<field_name> <= <ios_confrecord>.<register_name>_<field_name>"
       "<register_name>_vld <= <ios_confrecord>.<register_name>_vld"
       "<ios_statrecord>.<register_name>_clr <= <register_name>_clr")
)


(iosmap_special_content_entry    ; # /io_ctrl|io_stat|io_conf_error/
 (RW      "<field_name> <= <ios_confrecord>.<field_name>")
 (RO_STD  "<ios_statrecord>.<field_name> <= <field_name>")
)

(iosmap_last_archi_info

 "dif_core_to_io.msg_payload                                <= msg_payload"
 ;  "dif_core_to_io.msg_dst_id                                 <= (OTHERS => '0')"
 ; "dif_core_to_io.msg_prio                                   <= (OTHERS => '0')"
 ; "dif_core_to_io.msg_rtse                                   <= '0'            "
 ; "dif_core_to_io.msg_rtsr                                   <= '0'            "
 ; "dif_core_to_io.msg_mail_type                              <= (OTHERS => '0')"
 "dif_core_to_io.msg_send_req                               <=  msg_send_req"
)

(iosmap_last_interface_info  {
 msg_send_req
 msg_payload<128
})
