
(entity heading      H1 H2 H3 H4  H5 H6)
(entity fontstyle    TT I  B  BIG SMALL)
(entity phrase       EM STRONG DFN CODE SAMP KBD VAR CITE ABBR ACRONYM)
(entity cellhalign   align:s char:s charoff:s)
(entity cellvalign   valign:s)
(entity reserved     "")
(entity coreattrs    id:s class:s style:s title:s)
(entity i18n         lang:s dir:s)
(entity events       onclick:s ondblclick:s onmousedown:s onmouseup:s onmouseover:s onmousemove:s onmouseout:s onkeypress:s onkeydown:s onkeyup:s)
(entity attrs        $coreattrs $i18n $events)

(attlist (| $fontstyle $phrase)  $attrs)
(attlist (| SUB SUP)             $attrs)
(attlist SPAN                    $attrs $reserved)
(attlist BDO                     $coreattrs lang:s dir:s)
(attlist BR                      $coreattrs)
(attlist BODY                    $attrs onload:s onunload:s)
(attlist ADDRESS                 $attrs)
(attlist DIV                     $attrs $reserved)
(attlist A                       $attrs charset:s type:s name:s href:s hreflang:s rel:s rev:s         
                                 accesskey:s shape:s coords:s tabindex:s onfocus:s onblur:s)

(attlist MAP                     $attrs name:s)
(attlist AREA                    $attrs shape:s coords:s href:s nohref:- alt:s tabindex:s accesskey:s onfocus:s onblur:s)
(attlist LINK                    $attrs charset:s href:s hreflang:s type:s rel:s rev:s media:s)
(attlist IMG                     $attrs src:s alt:s longdesc:s name:s height:s width:s usemap:s ismap:-)
(attlist OBJECT                  $attrs declare:- classid:s codebase:s data:s type:s codetype:s archive:s standby:s height:s width:s 
	                         usemap:s name:s tabindex:s $reserved)

(attlist INPUT                   $attrs type:s name:s value:s checked:s disabled:- readonly:- size:s maxlength:s src:s alt:s
                                 usemap:s ismap:- tabindex:s accesskey:s onfocus:s onblur:s onselect:s onchange:s accept:s $reserved)

(attlist TEXTAREA                $attrs name:s rows:s cols:s disabled:- readonly:- tabindex:s accesskey:s onfocus:s onblur:s 
	                         onselect:s onchange:s $reserved)

(attlist PARAM                   id:s name:s value:s valuetype:s type:s)
(attlist HR                      $attrs)
(attlist P                       $attrs)
(attlist $heading                $attrs)
(attlist PRE                     $attrs)
(attlist Q                       $attrs cite:s)
(attlist BLOCKQUOTE              $attrs cite:s)
(attlist (| INS DEL)             $attrs cite:s datetime:s)
(attlist DL                      $attrs)
(attlist (| DT DD)               $attrs)
(attlist OL                      $attrs)
(attlist UL                      $attrs)
(attlist LI                      $attrs)
(attlist FORM                    $attrs action:s method:s enctype:s accept:s name:s onsubmit:s onreset:s accept-charset:s)
(attlist LABEL                   $attrs for:s accesskey:s onfocus:s onblur:s)
(attlist SELECT                  $attrs name:s size:s multiple:- disabled:- tabindex:s onfocus:s onblur:s onchange:s $reserved)
(attlist OPTGROUP                $attrs disabled:- label:s)
(attlist OPTION                  $attrs selected:- disabled:- label:s value:s)
(attlist FIELDSET                $attrs)
(attlist LEGEND                  $attrs accesskey:s)
(attlist BUTTON                  $attrs name:s value:s type:s disabled:- tabindex:s accesskey:s onfocus:s onblur:s $reserved)
(attlist TABLE                   $attrs summary:s width:s border:s frame:s rules:s cellspacing:s cellpadding:s $reserved datapagesize:s)
(attlist CAPTION                 $attrs)
(attlist COLGROUP                $attrs span:s width:s $cellhalign $cellvalign)
(attlist COL                     $attrs span:s width:s $cellhalign $cellvalign)
(attlist (| THEAD TBODY TFOOT)   $attrs $cellhalign $cellvalign)
(attlist TR                      $attrs $cellhalign $cellvalign)
(attlist (| TH TD)               $attrs abbr:s axis:s headers:s scope:s rowspan:s colspan:s $cellhalign $cellvalign)
(attlist HEAD                    $i18n profile:s)
(attlist TITLE                   $i18n)
(attlist BASE                    href:s)
(attlist META                    $i18n http-equiv:s name:s content:s scheme:s)
(attlist STYLE                   $i18n type:s media:s title:s)
(attlist SCRIPT                  charset:s type:s src:s defer:- event:s for:s)
(attlist NOSCRIPT                $attrs)
(attlist HTML                    $i18n)
(attlist FRAMESET                $coreattrs  rows:s cols:s onload:s onunload:s)
(attlist NOFRAME                 $attrs)
(attlist FRAME                   $coreattrs  longdesc:s name:s src:s frameborder:s marginwidth:s marginheight:s noresize:- scrolling:s)


(alias  submit     (input -type submit    $ARGV))
(alias  button     (input -type button    $ARGV))
(alias  reset      (input -type reset     $ARGV))
(alias  text       (input -type text      $ARGV))
(alias  password   (input -type password  $ARGV))
(alias  file       (input -type file      $ARGV))
(alias  form       (form  -method get     $ARGV))
(alias  form_get   (form  -method get     $ARGV))
(alias  form_post  (form  -method post    $ARGV))
(alias  post       (form  -method post    $ARGV))
