(action   dm_sheets)

(mode	
  (functional "mode =~ /^func/")
)

(iomode 
  (jtag_iomode0 "iomode =~ /^io_mode0/")
  (jtag_iomode1 "iomode =~ /^io_mode1/")
  (jtag_iomode2 "iomode =~ /^io_mode2/")
)

(corner
 (1.4	"corner =~ /^1\.4/")
 (1.3	"corner =~ /^QC/")
 (1.05	"corner =~ /^1\.05/")
)

(filter_sequence corner mode iomode)

(maptable
 (DEFAULT	reportiming)
)

(paths
 (titools 
   (input 	"startpoint =~ /jtag_tdi|jtag_tms/ && startpoint_clock =~ /GEN_jtag_RTCK_out/ && endpoint_clock !~ /GEN_jtag_D2DN3G_TCK_out/")
   (output 	"endpoint   =~ /jtag_tdo/          && endpoint_clock   =~ /GEN_jtag_RTCK_out/")
 )

 (armtools 
   (input 	"startpoint =~ /jtag_tdi|jtag_tms/ && startpoint_clock =~ /VIR_jtag_TCK_arm_in/ && endpoint_clock !~ /GEN_jtag_D2DN3G_TCK_out/")
   (output 	"endpoint   =~ /jtag_tdo/          && endpoint_clock   =~ /GEN_jtag_RTCK_arm_out/")
 )

 (lauterbachtools 
   (input 	"startpoint =~ /jtag_tdi|jtag_tms/ && startpoint_clock	=~ /VIR_jtag_TCK_lau_in/  && endpoint_clock !~ /GEN_jtag_D2DN3G_TCK_out/")
   (output 	"endpoint   =~ /jtag_tdo/          && endpoint_clock	=~ /GEN_jtag_RTCK_lau_out/")
 )

 (standardmode
   (input 	"startpoint =~ /jtag_tdi|jtag_tms/ && startpoint_clock	=~ /VIR_jtag_TCK_in/")
   (output 	"endpoint   =~ /jtag_tdo/          && endpoint_clock    =~ /VIR_jtag_TCK_in/")
 )

 (hsrtdx
   (input 	"startpoint =~ /(?:jtag_emu|gpio_13)[01]/ && startpoint_clock =~ /GEN_jtag_RTCK_out/")
   (output 	"endpoint   =~ /(?:jtag_emu|gpio_13)[01]/ && endpoint_clock   =~ /GEN_jtag_RTCK_out/")
 )

 (oct
   (input 	"startpoint =~ /d2dn3gtdo/           && startpoint_clock =~ /GEN_jtag_D2DN3G_TCK_out$/")
   (output 	"endpoint   =~ /d2dn3gtdi|d2dn3gtms/ && endpoint_clock	 =~ /GEN_jtag_D2DN3G_TCK_out$/ && startpoint !~ /jtag_(?:tdi|tms)/")
 )
 
 (MPU_rise_to_oct_fall_halfcycle
   (output			{
   				 startpoint_clock =~ /jtag_MPU_CLKIN_BIS/ &&
     				 endpoint	  =~ /d2dn3gtdi/	  &&
     				 endpoint_clock	  =~ /GEN_jtag_D2DN3G_TCK_out_FALL/
				}
   )
 )


 (TTool_rise_to_oct_rise_fullcycle
   (input 	{
   		 startpoint	  =~ /jtag_(?:tdi|tms)/ 		&& 
   	         startpoint_clock =~ /GEN_jtag_RTCK_out/		&&
   		 endpoint	  =~ /d2dn3g(?:tdi|tms)/ 		&& 
   	         endpoint_clock   =~ /GEN_jtag_D2DN3G_TCK_out_FULL_CYCLE/
		}
   )
 )
 
 (ATool_fall_to_oct_rise_halfcycle
   (input 	{
   		 startpoint	  =~ /jtag_(?:tdi|tms)/ 		&& 
   	         startpoint_clock =~ /VIR_jtag_TCK_arm_in/		&&
   		 endpoint	  =~ /d2dn3g(?:tdi|tms)/ 		&& 
   	         endpoint_clock   =~ /GEN_jtag_D2DN3G_TCK_out$/
		}
   )
 )

 (LTool_fall_to_oct_rise_halfcycle
   (input 	{
   		 startpoint	  =~ /jtag_(?:tdi|tms)/ 		&& 
   	         startpoint_clock =~ /VIR_jtag_TCK_lau_in/		&&
   		 endpoint	  =~ /d2dn3g(?:tdi|tms)/ 		&& 
   	         endpoint_clock   =~ /GEN_jtag_D2DN3G_TCK_out$/
		}
   )
 )
)


(nopath_check
  (titools 
   (input	jtag_tdi jtag_tms)
   (output	jtag_tdo))

  (armtools 
   (input	jtag_tdi jtag_tms)
   (output	jtag_tdo))

  (lauterbachtools 
   (input	jtag_tdi jtag_tms)
   (output	jtag_tdo))

  (standardmode 
   (input	jtag_tdi jtag_tms)
   (output	jtag_tdo))

  (hsrtdx 
   (input	jtag_emu0 jtag_emu1 gpio_130 gpio_131)
   (output	jtag_emu0 jtag_emu1 gpio_130 gpio_131))

  (oct 
   (input	d2dn3gtdo)
   (output	d2dn3gtdi d2dn3gtms))

)

(cycle_type
  (titools 	(input			"full") 
       		(input_launch_edge	"rise")
       		(output			"half") 
       		(output_capture_edge	"rise")
  )

  (armtools 	(input			"half") 
       		(input_launch_edge	"fall")
       		(output			"half") 
       		(output_capture_edge	"rise")
  )

  (lauterbachtools 	(input			"half") 
       		        (input_launch_edge	"fall")
       		        (output			"full") 
       		        (output_capture_edge	"fall")
  )

  (standardmode (input			"half") 
       		(input_launch_edge	"fall")
       		(output			"half") 
       		(output_capture_edge	"rise")
  )
  
  (hsrtdx	(input			"full") 
       		(input_launch_edge	"rise")
       		(output			"full") 
       		(output_capture_edge	"rise")
  )
  
  (oct		(input			"half") 
       		(input_launch_edge	"fall")
       		(output			"half") 
       		(output_capture_edge	"rise")
  )

 (MPU_rise_to_oct_fall_halfcycle
 		(output			"half")
       		(output_capture_edge	"fall")
 )

 (TTool_rise_to_oct_rise_fullcycle
 		(input			"full")
       		(input_launch_edge	"rise")
 )
 
 (ATool_fall_to_oct_rise_halfcycle
 		(input			"half")
       		(input_launch_edge	"fall")
 )

 (LTool_fall_to_oct_rise_halfcycle
 		(input			"half")
       		(input_launch_edge	"fall")
 )
)


; The following frequencies (Mhz) are used for Calculations
(frequencies
  (1.3			33.33)
  (1.4			33.33)
  (1.05			16.66)
)


