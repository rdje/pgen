(checkinfo
 (lineids ; Think SQL PRIMARY KEY concept
          ; That is the set of columns used to uniquely
	  ; identify a line, i.e, row.
	  ; Columns numbers mentioned here point to the 
	  ; LOF file column indexes, starting from '0'.
  (ioinfo_i 	0 1 2 3	)
  (combi 	0 1	)
  (nopath 	0	)
  
  (port 	2	)
  (pin 		1 2 	)
  ;(secm l_cm0 l_cm1 l_cm2 ...)

  (consolid_setup  0 1 2 3 4 5 6 7 9)
  (consolid_hold   0 1 2 3 4 5 6 7 9)
 )

