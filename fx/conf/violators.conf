; Explicit script mapping
; Implicit (default) being to use the LOF section 
; name as the script name
(scriptmap ; When not in DIFF mode
 ;             		    script name
 (setup_summary			summary)
 (hold_summary			summary)

 ; For N3G es1.1 These are scaled by default
 (consolid_setup		consolidated_rep)
 (consolid_hold			consolidated_rep)
 (consolidated_ns		consolidated_rep)

 (regrestatus_setup		consolidated_rep)
 (regrestatus_hold		consolidated_rep)
; (regrestatus_setup		consolidated_rep_wscale)
; (regrestatus_hold		consolidated_rep_wscale)


 (stan_questionable_paths 	consolidated_rep)
 (stan_potential_fp		consolidated_rep)
 (stan_freqency_detailed_paths  consolidated_rep)
)

(scripts

 (default_lof_driver_summary
   (foreach col 
     (if (match $col "internal:") 
       (write ($col $col) "asimple_link")
       (write ($col $col) "asimple_value")
     )
   )
 )
 
 (captions
   (write (0 0) "caption_index")
   (write (1 1) "caption_name")
 )
 

 (clockinfo
   (foreach (col) (block
    (if (eval "$col == 0") (write (0 0) "name"))
    (if (eval "$col == 1") (write (1 1) "number"))
    (if (eval "$col == 2") 
     (if (match 2 "(?i:propagated)") 
       (write_force (2 " ") "propagated")
       (write_force (2 " ") "ideal")))

    (if (eval "$col == 5") 
      (if (match $col "-") 
	(write_force (3 " ") "default")
	(write (3 5) "clocksrc")))

    (if (eval "$col == 6") (block
     (if (match 6 "(?i:inout)") (write (4 6) "inout"))
     (if (match 6 "(?i:in)$")   (write (4 6) "input"))
     (if (match 6 "^(?i:out)")  (write (4 6) "output"))))

    (if (eval "$col == 7") (block
     (if (match 7 "(?i:pin)")   (write (5 7) "pin"))
     (if (match 7 "(?i:port)")  (write (5 7) "port"))))
    
    (if (eval "$col == 3") (write (6 3) "number")) ; setup uncertainty
    (if (eval "$col == 4") (write (7 4) "hold_uncertainty"))

    (if (eval "$col >= 8") 
      (if (match $col "\/")
	(write ($col $col) "isit_mc")
	(write ($col $col) "true_potential_mc")))
   )
  )
 )

 
 (consolidated_rep
   (write (0 0) "consolid_mode")
   (if (match 9 "NOT_USED_ANYMORE") 
    (then		; N3G style
      (write (1 1) "consolid_corner")
      (write (2 10) "file_path")
      (write (3 2) "name")
      
      (if (match 3 "-")
       (write (4 3) "undefined")
       (write (4 3) "refclock")
      )
      
      (write (5 4) "clockedge")
      (write (6 5) "name")

      (if (match 6 "-")
       (write (7 6) "undefined")
       (write (7 6) "refclock")
      )

      (write (8 7) "clockedge")
      
      ; Slack
      (if (match 8 "\d+(\.\d+)?$") (write (9 8) "positive_slack"))
      (if (match 8 "-\d+(\.\d+)?$") (write (9 8) "negative_slack"))
      (if (match 8 "(?i:infinity)") (write_force (9 "-") "unconstrained"))

      ;(if (match  10 "/") (write (9 10) ("file_path")))
      ; QC_MAX scaled Slack
      (if (match 26 "^\d+(\.\d+)?") 	(write (10 26) "positive_scaled_slack"))
      (if (match 26 "^-") 		(write (10 26) "negative_scaled_slack"))
      (if (match 26 "(?i:infinity)") 	(write_force (10 "-") "unconstrained"))
      )

    (else
     (if (match 0 "#") 
       (foreach col (if (eval "$col <= 10") (write_force ($col " ") "top_bottom")))	 
       
       (else
        (write (1 9) "consolid_iomode")
        (write (2 1) "consolid_corner")
        (write (3 12) "url" "http://rdss712.tif.ti.com:9000/cgi-bin/getpath.cgi?")
        (write (4 2) "name")
        
        (if (match 3 "-")
         (write (5 3) "undefined")
         (write (5 3) "refclock")
        )
        
        (write (6 4) "clockedge")
        (write (7 5) "name")

        (if (match 6 "-")
         (write (8 6) "undefined")
         (write (8 6) "refclock")
        )

        (write (9 7) "clockedge")
        
        ; Slack
        (if (match 8 "^internal:.+@\d+(\.\d+)?") 	(write (10 8) "positive_slack_wlink"))
        (if (match 8 "^internal:.+@-") 			(write (10 8) "negative_slack_wlink"))
        (if (match 8 "^\d+(\.\d+)?") 			(write (10 8) "positive_slack"))
        (if (match 8 "^-") 				(write (10 8) "negative_slack"))
        (if (match 8 "(?i:infinity)") 			(write_force (10 "-") "unconstrained"))
      )
     )
    )
   )
 )
 
(consolidated_rep_wscale
   (write (0 0) "consolid_mode")
   (if (match 0 "#") 
     (foreach col (if (eval "$col <= 10") (write_force ($col " ") "top_bottom")))	 
     
     (else
      (write (1 9) "consolid_iomode")
      (write (2 1) "consolid_corner")
      (write (3 12) "url" "http://rdss712.tif.ti.com:9000/cgi-bin/getpath.cgi?")
      (write (4 2) "name")
      
      (if (match 3 "-")
       (write (5 3) "undefined")
       (write (5 3) "refclock")
      )
      
      (write (6 4) "clockedge")
      (write (7 5) "name")

      (if (match 6 "-")
       (write (8 6) "undefined")
       (write (8 6) "refclock")
      )

      (write (9 7) "clockedge")
      
      ; Slack
      (if (match 8 "^internal:.+@\d+(\.\d+)?") 	(write (10 8) "positive_slack_wlink"))
      (if (match 8 "^internal:.+@-") 			(write (10 8) "negative_slack_wlink"))
      (if (match 8 "^\d+(\.\d+)?") 			(write (10 8) "positive_slack"))
      (if (match 8 "^-") 				(write (10 8) "negative_slack"))
      (if (match 8 "(?i:infinity)") 			(write_force (10 "-") "unconstrained"))
      
      ; QC_MAX scaled Slack
      (if (match 26 "^internal:.+@\d+(\.\d+)?") 	(write (11 26) "positive_slack_wlink"))
      (if (match 26 "^internal:.+@-") 			(write (11 26) "negative_slack_wlink"))
      (if (match 26 "^\d+(\.\d+)?") 			(write (11 26) "positive_scaled_slack"))
      (if (match 26 "^-") 				(write (11 26) "negative_scaled_slack"))
      (if (match 26 "(?i:infinity)") 			(write_force (11 "-") "unconstrained"))
    )
   )
 )
 
 (tcfix_check
   (foreach col (if (eval "$_ROW_ == 0") 
     (write ($col $col) "name") 

     (block
      (if (match $col "^good:")        (write       ($col $col) "positive_slack"))
      (if (match $col "^bad:")         (write       ($col $col) "negative_slack"))
      (if (match $col "(?i)infinity")  (write_force ($col "?") "undefined"))
      (if (match $col "^-$")           (write_force ($col "-") "undefined"))
     )
   )
  )
 )

 (clock_margin
  (foreach col (if (eval "$_ROW_ == 0")
   ; First Row #0
   (if (eval "$col == 0")
    (write_force ($col " ") "undefined")
    (if (match $col "^re:")
     (write ($col $col) "refclock_blue")
     (write ($col $col) "refclock")
    )
   )

   ; Other Rows #1 to #last
   (if (eval "$col == 0")
    (if (match $col "^re:")
     (write ($col $col) "refclock_blue")
     (write ($col $col) "refclock")
    )

    (if (match $col "^[-+*]$") 
      (block
      (if (match $col "-")  (write       ($col $col) "undefined"))
      (if (match $col "\+") (write_force ($col " ") "green_cells"))
      (if (match $col "\*") (write_force ($col " ") "black_cells"))
      )

      (if (match $col "-")
       (write ($col $col) "white_on_red")
       (write ($col $col) "margin_number")
      )
    )
   )
  )
  )
 )

 (stan_frequency_summary
   (foreach col (block
     (if (match $col "\+")  	  	(write_force ($col " ")  "undefined"))
     (if (match $col "\?")  	  	(write       ($col $col) "red_on_yellow"))
     (if (match $col "^\d+\.\d+$")  	(write       ($col $col) "voltage"))
     (if (match $col "^\d+$")       	(write       ($col $col) "frequency"))
     (if (match $col "[a-zA-Z_]+")      (write       ($col $col) "path_type"))
    )
   )
 )

 (stan_nopath_check
  (write (0 0) "portname")
  (if (match 5 "input") (write (1 5)  "input"))
  (if (match 5 "output") (write (1 5) "output"))
  (write (2 1) "voltage")
  (write (3 2) "nopath_mode")
  (write (4 3) "consolid_iomode")
  (write (5 4) "path_type")
 )

 (stan_frequency_detailed
   (foreach col (block
     (if (match $col "/") 	  (write ($col $col)       "path_type"))
     (if (match $col "^\d\.\d+$") (write ($col $col)       "voltage"))
     (if (match $col "io_mode")   (write ($col $col)       "consolid_iomode"))
     (if (match $col "internal")  (write ($col $col)       "margin_number"))
     (if (match $col "\+")  	  (write_force ($col " ")  "undefined"))
     (if (match $col "^-$")  	  (write ($col $col)       "white_on_red_bold"))
     (if (match $col "\?")  	  (write ($col $col)       "black_on_purple"))
     (if (match $col "\(")  	  (write ($col $col)       "white_on_black_bold"))
    )
   )
 )

 (stan_dmeasures
  (foreach col 
    (if (eval {$_ROW_ == 0})

     (if (match $col "\+")
      (write_force ($col " " )  "undefined")
      (write       ($col $col)  "dm_corner")   
     )

     (if (match $col "^[A-Z]+[-A-Z]*")        (write ($col $col)       dm_segment)
      (if (match $col "^(?:min|max)")              (write ($col $col)       dm_minmax)
       (if (match $col "internal:|^\d+(?:\.\d+)?")     
                                              (write ($col $col)       margin_number)
        (if (match $col "^-$")                
	                                      (write_force ($col "-")  undefined)
	                                      (write       ($col $col) consolid_iomode)
	
	)
       )
      )
     )
    )
  )
 )
 
 (tssio
  (foreach col 
   (if (eval {$_ROW_ == 0})
    (write ($col $col) header_wob)
    (if (eval {$col <= 3})
     (then
      (write (0 0) name)
      (write (1 1) consolid_iomode)
;      (if (match 2 input)
;       (write (2 2) input)
;       (write (2 2) output)
;      )
      
      (write (2 2) port)
      (if (match 3 -)
       (write (3 3) undefined)
       (write (3 3) refclock_green)
      )
     )

     (if (match $col "internal:")
       (write ($col $col) margin_number)
       (if (match $col "^-$") 
        (if (eval {(($col - 4 ) % 16 == 0) || (($col - 12) % 16 == 0)})
	 (if (eval {($col - 4 ) % 16 == 0}) 
	   (then
	    (if (eval {$col == 4})  (write ($col $col) undefined_2black))
	    (if (eval {$col == 20}) (write ($col $col) undefined_2blue))
	    (if (eval {$col == 36}) (write ($col $col) undefined_2red))
	   )

           (write ($col $col) undefined_1black)
	 )

	 (write ($col $col) undefined)
	)
        
	(else
         (if (eval {($col - 4 ) % 16 == 0}) 
	   (then
	    (if (eval {$col == 4})  (write ($col $col) litegreen_2black))
	    (if (eval {$col == 20}) (write ($col $col) litegreen_2blue))
	    (if (eval {$col == 36}) (write ($col $col) litegreen_2red))
	   )
	 )

         (if (eval {($col - 12) % 16 == 0}) (write ($col $col) litegreen_1black))

	 ; Cycle type
	 (if (eval {($col - 5) % 4 == 0}) 
	  (if (match $col "^H$") 
	   (write ($col $col) red_on_liteblue_b)
	   (write ($col $col) blue_on_liteblue_b)
	  )
	 )
	 
	 ; TSS info
	 (if (eval {($col - 6) % 4 == 0}) (write ($col $col) litepurple))
	)
       )
     )
    )
   )
  )
 )

 (qcsummary
  (foreach col (block
    (if (eval {$_ROW_ == 0}) (
     (if (match $col "\+")
      (write_force ($col " ") default)
      (write ($col $col) consolid_corner)
     ) 
    ))

    (if (eval {$_ROW_ == 1}) 
     (if (eval {$col <= 5})
      (write ($col $col) header_wob)
      (else
        (if (eval {$col == 6})  (write (7  $col) header_wob))
        (if (eval {$col == 7})  (write (9  $col) header_wob))
        (if (eval {$col == 8})  (write (6  $col) header_wob))
        (if (eval {$col == 9})  (write (8  $col) header_wob))
        (if (eval {$col == 10}) (write (10 $col) header_wob))
        (if (eval {$col == 11}) (write (11 $col) header_wob))
      )
     )
    )
    
    (if (eval {$_ROW_ >  1}) 
     (if (match $col "^[\+\-]$")
      (if (match $col "\+")
       (write_force ($col " ")  blue_on_liteblue_b)
       (if (eval {$col == 11}) 
        (write_force ($col " ")  comment)
        (write       ($col $col) undefined)
       )
      )
      
      (else
        (if (eval {$col == 0}) 
         (if (match $col in) 
          (write ($col $col) input)
          (write ($col $col) output)
         )
        )
        
        (if (eval {$col == 1}) (write ($col $col) name))
        (if (eval {$col == 2})  
	 (then
	  (if (match $col "(?i)^constrained")  (write ($col $col) status_constrained))
	  (if (match $col "(?i)(?:unconstrained|not_constrained|clock_gating)") (write ($col $col) status_uconstrained))
	 )
	)
        
	(if (eval {$col == 3}) (write ($col $col) margin_number))
        (if (eval {$col == 4}) (write ($col $col) margin_number))

        (if (eval {$col == 5}) 
	 (then 
           (if (match $col "^\d+(\.\d+)?") (write ($col $col) "positive_slack"))
           (if (match $col "^-") 	   (write ($col $col) "negative_slack"))
	 )
	)
        
	(if (eval {$col == 6}) (write  (7  $col) refclock))
        (if (eval {$col == 7}) (write  (9  $col) refclock))
        (if (eval {$col == 8}) (write  (6  $col) name))
        (if (eval {$col == 9}) (write  (8  $col) name))
        (if (eval {$col == 10}) (write (10 $col) cts_tpd))
      )
     )
    )
   )
  )
 )

 (jm_dutycycle
   (write (0 0) "refclock")
   (write (1 1) "jmspecific")
   (write (2 2) "margin_number")
   (write (3 3) "margin_number")
   (write (4 4) "margin_number")
   (write (5 5) "margin_number")
   (write (6 6) "margin_number")
   (write (7 7) "margin_number")
 )

