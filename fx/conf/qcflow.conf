(ocp-level2-w-threadbusy-exact
 (datahandshake-group 
    (mdatathreadid                0       30      -4      40) 
    (sdataacce?pt                 0       55      -1.5    15) 

    ; Setting to default
    (mdata                  [ocpl2-others])
    (mdatavalid             [ocpl2-others])
    (mdatabyteen            [ocpl2-others])
    (mdatainfo              [ocpl2-others])
    (mdatalast              [ocpl2-others])
 )
 
 (request-group 
    (mthreadid              [ocp-level2-w-threadbusy-exact/datahandshake-group/mdatathreadid])
    (scmdacce?pt            [ocp-level2-w-threadbusy-exact/datahandshake-group/sdataacce?pt])

    ; Setting to default
    (maddr               [ocpl2-others])
    (mcmd                [ocpl2-others])
    (maddrspace          [ocpl2-others])
    (mbytee?n            [ocpl2-others])
    (mreqinfo            [ocpl2-others])
    (mconnid             [ocpl2-others])
    (matomiclength       [ocpl2-others])
    (mburstlength        [ocpl2-others])
    (mburstprecise       [ocpl2-others])
    (mburstseq           [ocpl2-others])
    (mburstsinglereq     [ocpl2-others])
    (mreqlast            [ocpl2-others])
    (mburst              [ocpl2-others])
 )
 
 (response-group 
    (sthreadid              [ocp-level2-w-threadbusy-exact/datahandshake-group/mdatathreadid])
    (mrespacce?pt           [ocp-level2-w-threadbusy-exact/datahandshake-group/sdataacce?pt])
    ; Setting to default
    (sdata              [ocpl2-others])
    (sresp              [ocpl2-others])
    (sdatainfo          [ocpl2-others])
    (srespinfo          [ocpl2-others])
    (sresplast          [ocpl2-others])
 )

 (data-flow-group 
    (mthreadbusy        0       10      -6      60)
    (streadbusy         [ocp-level2-w-threadbusy-exact/data-flow-group/mthreadbusy])
    (sdatathreadbusy    [ocp-level2-w-threadbusy-exact/data-flow-group/mthreadbusy])
 )

 (side-band-group 
    (control            [ocp-level2-w-threadbusy-exact/data-flow-group/mthreadbusy])
    (controlwr          [ocp-level2-w-threadbusy-exact/data-flow-group/mthreadbusy])
    (status             [ocp-level2-w-threadbusy-exact/data-flow-group/mthreadbusy])
    (statusrd           [ocp-level2-w-threadbusy-exact/data-flow-group/mthreadbusy])

    (mflag              0       20      -5      50)
    (sflag              [ocp-level2-w-threadbusy-exact/side-band-group/mflag])
    (merror             [ocp-level2-w-threadbusy-exact/side-band-group/mflag])
    (serror             [ocp-level2-w-threadbusy-exact/side-band-group/mflag])
    (sresetn            [ocp-level2-w-threadbusy-exact/side-band-group/mflag])
    (sinterrupt         [ocp-level2-w-threadbusy-exact/side-band-group/mflag])

    (controlbusy        [ocp-level2-w-threadbusy-exact/data-flow-group/mthreadbusy])
    (statusbusy         [ocp-level2-w-threadbusy-exact/data-flow-group/mthreadbusy])

    (mresetn            [ocp-level2-w-threadbusy-exact/data-flow-group/mthreadbusy])
 )

 (others-side-bands-signals midlereq wait mstandby sidleack swakeup)
 
 (test-group scanctrl scanin scanout clkbyp testclk tck tdi tdo tms trstn)
)

