;=================================================
; Scan signals (Shift)
;=================================================
(scan-shift
 ; <= 50Mhz
 ;(legacy
 ; ("(?:scanctrl|scanen|testbsen|bndrytesten)"   -       -       0       40)

 ; (scanin                                       -       -       0       15)
 ; (scanout                                      F:0     F:10    -       - )
 ;)

 ; > 50Mhz
 (ndev
  ("(?:test.?)?scanen"                        -       -       0       90)
  ("(?:test.?)?scanin"                        -       -       0       30)
  ("(?:test.?)?scanout"                       0       20      -       - )
  ("(?:test.?)?pipe.?bypass.*[io]"              [scan-shift/ndev/"(?:test.?)?scanen"])
  ("(?:test.?)?lul.?bypass"                     [scan-shift/ndev/"(?:test.?)?scanen"])
  ("(?:test.?)?bsc.?scanen"                     [scan-shift/ndev/"(?:test.?)?scanen"])
  ("(?:test.?)?bsc.?scanin"                     [scan-shift/ndev/"(?:test.?)?scanin"])
  ("(?:test.?)?bsc.?scanout"                    [scan-shift/ndev/"(?:test.?)?scanout"])
 )
)

;=================================================
; Scan signals (Stuck-at / TFT)
;=================================================
(scan-stuckat-tft
 ; <= 50Mhz
 (legacy
  (stuckat
    ("(?:test|scan)mode"                        -       -       0       40)
  )
 )

 ; > 50Mhz
 (ndev
  (stuckat
   ("(?:test.?)?bsc.?mode."                     -       -       -       NS:10)
   ("(?:test.?)?clk(?:in|out)en.+"              -       -       0       40)
   ("(?:test.?)?clk.?invdis"                    -       -       0       90)
   ("(?:test.?)?clk.?bypass"                    -       -       -       NS:10)
   ("(?:test.?)?event.?ctrl"                    -       -       0       40)
   ("(?:test.?)?feedback.?loop"                 -       -       0       40)
   ("(?:test.?)?rst.?bypass"                    -       -       0       40)
   ("(?:test.?)?transparent.?latch"             -       -       -       40)
  )

  (tft
   ("(?:test.?)?bsc.?tft"                       -       -       0       80)
   ("(?:test.?)?tftmode"                        -       -       0       40)
   ("(?:test.?)?sharper.?(?:bypass|on)"         -       -       0       90)
   ("(?:test.?)?sharper.?resetn"                -       -       0       60)
   ("(?:test.?)?(?:wave|ck).?conf.+"            -       -       0       90)
   ("(?:test.?)?startbit"                       -       -       0       60)
  )
 )
)

;=================================================
; Scan signals (DTC/Test Kompress/Power Compiler)
;=================================================
(scan-dtc-tk-pc
  ; <= 50Mhz
  (legacy
   ; Test Kompress
   (tk
     (edtupdate                                 -       -       0       40)
     (edtbypass                                 -       -       0       40)
   )
  )

  ; > 50Mhz
  (ndev
    (dtc
      ("test.?dtc.+"                            -       -       0       85)
    )

    ; Test Kompress
    (tk
      ("(?:test.?)?edt.?update"                 -       -       0       40)
      ("(?:test.?)?edt.?bypass"                 -       -       0       80)
    )

    ; Power compiler
    (pc
      ("(?:test.?)?gated.?clken"                -       -       0       40)
    )
  )
)

