
(table_re               "(?s)\n(1,1,.+?)\n(?:0|\d+,0,+?END),+")
(vssvdd_re              "(?i:power|ground)")
(groups                 clocks ios)

(sequence               ocp-level2-w-threadbusy-exact ocp-jtag scan-shift scan-stuckat-tft scan-dtc-tk-pc mbist pbist efuse 50x-5000x i2async-t2async other-signals)
(continuation_code      2)
(start_code             1)

(default_output_directory       ./QCFLOW)

(main_filter_re         {
                         io_type  !~ /(?i)Warning:/ && 
                        ((io_type  =~ /IO\s+Type/ && budget !~ /0/)                          ||
                          status   =~ /PATH_IS_UNCONSTRAINED|NOT_CONSTRAINED/                ||
                         (status   =~ /^(?:CONSTRAINED|CLOCK_GATING)/ && slack =~ /^-/)
                        )
                        }
)

(secondary_filter_re    "io_type  !~ /(?i)Warning:/ && (io_type  =~ /IO\s+Type/ && budget !~ /0/ ||  io_type =~ /(?i)in|out/)")
(ignored_timing_types_re  "(?i)(?:max|min)_pulse_width")

(tableport_2_xcel2hm_re 
  "\(XCEL2HM vs GUIDELINE\) Clock Edge Mismatch|\(XCEL2HM vs GUIDELINE\) Ports With Multiple Matches in the GUIDELINE"
  "\(XCEL2HM vs GUIDELINE\) Budget Check: (?:Failed|Passed)|\(XCEL2HM vs GUIDELINE\) Ports not defined in the GUIDELINE"
  "\(XCEL2HM vs GUIDELINE\) Ports with a reference clock but with NO min & max budgets"
  "\(XCEL2HM vs GUIDELINE\) Ports with NO reference clock"
  "Port used as a clock in XCEL2HM but not defined as clock in XCEL2HM"
  "\(XCEL2HM vs GUIDELINE\) No Guideline Budget defined"
)

(max2min_scaling_factor           0.3)

(by_clocknames
 (clockn        group_by clock_name xcel2hm_clock)
)

(by_ionames
 (ion           group_by port_name xcel2hm_io)
)

(filter_sequence   by_clocknames)

(maptable
 (by_clocknames   xcel2hm_clock)
 (by_ionames      xcel2hm_io)
)


