(AUTHOR         "Richard Dje * r-dje@ti.com")

(OPP_DEF
 (OPP1 (RE "^QC"  ) (TEXT "1.35V")) 
 (OPP2 (RE "^1\.2") (TEXT "1.2V" ))
 (OPP3 (RE "^1\.0") (TEXT "1.0V" ))
 (OPP4 (RE "^0\.9") (TEXT "0.9V" ))
)

(capacitance_load_unit    1)

(edge_RE   
  (rise_fall   "(?i)R\s*(?:or|&)\s*F")
  (fall_rise   "(?i)F\s*(?:or|&)\s*R")
)

(vsplit_1x     13 12 12 12 12)
(refclock_RE   "^REF(?:_CLK)?$")

; Expressed in pico-seconds
(hold_uncertainty                 30)

(map            seto://tablegrep/tss2sta_map)
(map_1x         seto://tablegrep/tss2sta_map_1x)

(default_template_map  map)

; ratio in (%)
; limit in (ns)
(jitter (ratio   5) (limit 2))

(sections clock clock_uncertainty input output)
(undefined_label  _undefined_)


