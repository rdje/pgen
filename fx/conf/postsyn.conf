)

(diag_no_push
 (TEST-123    1) ; Information: No useful information provided
 (TEST-171    1) ; Information: XX other cells with the same violation 
 (TEST-173    1) ; Information: XX other cells with the same violation 
 (TEST-283    1) ; Information: Cells with this violation
 (TEST-299    1) ; Information: XX other ports with the same violation
)

