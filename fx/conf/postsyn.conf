(re_def

 (file2load_re   "_(?:check_scan_drc|check_test|coverage|nonscan_cells)\.rep$")
 (filesplit_re   "-{65,}")
 (nonscan_re     "(\S+)\s+\((\S+)\)")
 
 (sections
   (in_mode_internal_scan       "In mode: Internal_scan")
   (common_violation_start      "Begin\s+([\w\s-]+?)\s*\.")
   (drc_report                  "DRC Report")
   (violation_summary           "MODELING VIOLATIONS|CLOCK VIOLATIONS|SCAN CHAIN VIOLATIONS")
   (sequential_cell_report      "Sequential Cell Report")
   (sequential_cell_violations  "SEQUENTIAL CELLS WITH(?:OUT)? VIOLATIONS")
 )
 
 (diagnosis_get                "(?ix)(?: Warning | Information | Error) : \s+ (?:.+?) \. \s+ \(  \S+?  (?:- \S+?)?  \)(?s) .*?  \s* (?=\n\n|Warning|Information|Error|$)")
 (diagnosis_fields             "(?ix)(   Warning | Information | Error) : \s+ (  .+?) \. \s+ \( (\S+?) (?:-(\S+?))? \)(?s)(.*?) \s* (?=\n\n|Warning|Information|Error|$)")
 (diag_special_type            "(?i)test")

 (diag_msg_analysis
   (C2          :1 "(\S+)$"                           )
   (C4          :1 "(?i)Clock\s+(\S+)"                )
   (C5          :1 "Clock\s+(\w+).+?(\S+)$"  :-1 "(\S+)\.$"  )
   (C8          :1 "^(\w+).+?(\S+)$"         :-1 "(\S+)\.$"  )
   (C17         :1 "Clock\s+(\w+).+?(\S+)$"           )
   (C18         :1 "clock\s+(\w+).+PO\s+(\S+)"        )
   (C23         :1 "\((\S+)\).+?\((\S+)\)"            )
   (C24         :1 "PI\s+(\S+).+?\((\S+)\)"           )
   (C25         :1 "\((\S+)\).+?\((\S+)\).+?\((\S+)\)")
   (C26         :1 "Clock\s+(\S+).+?clock\s+(\S+).+?\((\S+)\)")
   (D1          :1 "\sinput\s+(\S+).+?DFF\s+(\S+)"    )
   (D2          :1 "DFF\s+(\S+)"                      )
   (D3          :1 "DFF\s+(\S+)"                      )
   (D8          :1 "Clock\s+(\S+)"                    )
   (D9          :1 "DFF\s+(\S+)"                      )
   (D10         :1 "Clock\s+(\S+).+?\binput\s+\((\S*?)\).+?DFF\s+(\S+)")
   (D15         :1 "^(\w+).+?(\S+)$"  :-1 "(\S+)\.$"  )
   (S19         :1 "Nonscan\s+DFF\s+(\S+)"            )
   (S27         :1 "Latch\s+(\S+).+\((.+)\)"          )
   (TEST-120    :1 "(\S+)\s+\((\S+)\)"                )
   (TEST-121    :1 "(\S+)\s+\((\S+)\)"                )
   (TEST-123    .                                     ) ; Information: No useful information provided
   (TEST-171    :1 "\d+"                              ) ; Information: XX other cells with the same violation 
   (TEST-173    :1 "\d+"                              ) ; Information: XX other cells with the same violation 
   (TEST-202    :1 "Cell\s+(\S+)\s+\((\S+?)\)"        )
   (TEST-283    :1 "\S+?(?=,|$)"                      ) ; Information: Cells with this violation
   (TEST-299    :1 "\d+"                              ) ; Information: XX other ports with the same violation
   (TEST-451    :1 "(\S+)\s+\((\S+)\).+?pin\s+(\S+)"  )
   (TEST-504    :1 "Cell\s+(\S+).+?(\d+)\s+value"     )
   (TEST-505    :1 "Cell\s+(\S+).+?(\d+)\s+value"     )
 )

 (check_re    "<blockname>_(\w+)\.rep")

 (asawhole_cb_map     
  (nonscan_cells    nonscan_cells)  
 )
)

(default_block  camisp)

(section_callback_map
