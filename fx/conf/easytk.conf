(tix
 (wa
  (tixpanedwindow	 tixPanedWindow) ; ****
  (tixnotebook		 tixNoteBook)

; They builtin subwidget(s)
; Other subwidgets should be added using the add command
  (tixlistnotebook	 tixListNoteBook)

; It only has one uniq type of sub-widget, that is 'button'
  (tixbuttonbox		 tixButtonBox)   ; ****
; It only has one uniq type of additional sub-widget, that is 'button'
; It also has one 'label' widget.
  (tixselect             tixSelect)

; Has two sub-widget but need to add information before use
  (tixoptionmenu         tixOptionMenu)
  
 )
 
 (builtin
  (tixchecklist		 tixCheckList)
  (tixcombobox		 tixComboBox)
  (tixcontrol		 tixControl)
  (tixdirlist            tixDirList)
  (tixdirselectdialog	 tixDirSelectDialog)
