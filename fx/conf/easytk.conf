)

(preprocess
 (trigger	"(?i)^(?:opt|conf|fcall).*")
 (special	"(?i)^(?:opt|conf).*")
)

(cmd_and_var_re		"(?i)(?:cmd|command|variable|listvar)\b")
(skipre			"(?i)\b(?:optionmenu|.*popup.*|w?call|event|grid|sticky|.*siz.*|xform-grid|xform-attach)\b")

(skip
  (xform-grid       1)
  (xform-attach     1)
  (grid             1)
  (sticky           1)
  (toplevel         1)
  (tixballoon       1)
  (event            1)
  (popup            1)
  (tkpopupmenu      1)
  (tikpopupmenu     1)
  (size             1)
  (minsize          1)
  (maxsize          1)
  (resizable        1)
)


; This hash is for not considering radiobutton and checkbutton as 
; Widget when processing a Menu widget
(menu 
  (radiobutton    1)
  (checkbutton    1)
)

(search_path		seto://env/search_path)
