;---------------- a2xls configuration file ---------------
(sections
; For Case analysis extraction
 (port		"=port=" "=portend=" "\s+")
 (pin		"=pin="  "=pinend="  "\s+")
)

(topofheaders
  (port   "Ports")
  (pin    "Pins")
)



(headers
  (port   "Port" "Direction" "Case Value")
  (pin    "Module" "Module Path" "Pin Relative Path" "Direction" "Case Value")
)


;(sheets
;
;; (pin	CASES)
;; (port  CASES)
;)


(scripts

 (port
  (write (0 2) "name")
  (if (match 3 "(?i:inout)") (write (1 3) "inout"))
  (if (match 3 "(?i:in)$")   (write (1 3) "input"))
  (if (match 3 "^(?i:out)")  (write (1 3) "output"))
  (if (match 4 "-") 
   (write       (2 4)     "dash")
   (write       (2 4)     "binary")
  )
 )

 (pin
  (write (0 0) "name")
  (write (1 1) "default")
  (write (2 2) "pin_relpath")
  (if (match 3 "(?i:inout)") (write (3 3) "inout"))
  (if (match 3 "(?i:in)$")   (write (3 3) "input"))
  (if (match 3 "^(?i:out)")  (write (3 3) "output"))
  (if (match 3 "^(?i:all)")  (write_force (3 "-") "nodirection"))

  (if (match 4 "-") 
   (write       (4 4)     "dash")
   (write       (4 4)     "binary")
  )
 ) 

)

