(format
 ; tree/dirlist_2ss
 (ss_node           (bg_color beige) (color black) (size 10) (align left) (border 1) (border_color white))
 (ss_leaf           (bg_color lightgreen) (color black) (size 10) (align left) (border 1) (border_color white))
 (ss_notsupported   (bg_color grey) (color black) (size 10) (align left) (border 1) (border_color white))
 
 (topofheader        (bg_color topofheader) (bold 1) (top 2) (align center))
 (header             (bg_color header) (align center) (border 1) (border_color white))
 (header_wob         (bg_color black) (color white) (bold 1) (size 11) (align center) (border 1) (border_color white))
 (name               (bg_color beige))
 (name_center        (bg_color beige) (align center))
 (name_wrb           (bg_color beige) (right 1) (right_color white))
 (name_wb            (bg_color beige) (border 1) (border_color white))
 (name_wrb_c         (bg_color beige) (right 1) (right_color white) (align center))
 (number             (bg_color light_orange1) (num_format 0.00) (align center) (valign vcenter))
 (number_wrb         (bg_color light_orange1) (num_format 0.00) (align center) (right 1) (right_color white))
 (binary             (bg_color light_orange1) (num_format 0) (align center))
 (number_nf          (bg_color light_orange1) (align center) (valign vcenter) (border 1) (border_color white))
 (number_rbar        (bg_color light_orange1) (num_format 0.00) (align center) (right 1))
 (dash               (bg_color white) (align center))
 (undefined          (bg_color white) (align center) (color black))

 (input              (bg_color input) (align center) (border 1) (border_color white))
 (inout              (bg_color brown) (color white) (align center) (border 1) (border_color white))
 (output             (bg_color output) (align center) (border 1) (border_color white))

 (refclock           (bg_color light_orange) (align center) )
 (refclock_wb        (bg_color light_orange) (align center) (border 1) (border_color white))
 (refclock_wrb       (bg_color light_orange) (align center) (right 1) (right_color white))
 (refclock_blue      (bg_color blue) (bold 1) (color white) (align center))
 (refclock_green     (bg_color bright_green) (color black) (align center))
 (top                (top 2))
 (notequal           (bg_color red) (color white) (align center))
 (port2refclk        (bg_color lightgreen))
 (skew               (bg_color light_orange1) (num_format 0.0))
 (aio_header         (bg_color blue) (color white) (right 1) (right_color white) (align center))
 (caption_index      (bg_color red) (color white) (bold 1) (align center))
 (caption_name       (bg_color light_orange) (bold 1))

